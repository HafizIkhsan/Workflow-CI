name: CI/CD MSML hafizikhsan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      
env:
  CSV_URL: "MLproject/loan_approval_preprocessed.csv"
  TARGET_VAR: "loan_approved"
  MLFLOW_TRACKING_URI: "file://${{ github.workspace }}/mlruns"
  EXPERIMENT_NAME: "workflow_ci_rf"
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
        # Checkout
      - name: Checkout repository
        uses: actions/checkout@v3

        # Setup Python
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

        # Check env
      - name: Check Env
        run: |
          echo $CSV_URL

        # Install global dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow pandas scikit-learn numpy

        # Run mlflow project
      - name: Run mlflow project
        run: |
          mlflow run ./MLproject --env-manager=local --experiment-name "${{ env.EXPERIMENT_NAME }}"

        # Get latest run_id
      - name: Get latest MLflow run_id
        run: |
          RUN_ID=$(python - <<'PY'
          import mlflow

          mlflow.set_tracking_uri("${{ env.MLFLOW_TRACKING_URI }}")
          experiment = mlflow.get_experiment_by_name("${{ env.EXPERIMENT_NAME }}")
          if experiment is None:
              raise SystemExit("Experiment not found")

          runs = mlflow.search_runs(
              experiment_ids=[experiment.experiment_id],
              order_by=["attributes.start_time DESC"],
              max_results=1,
          )
          if runs.empty:
              raise SystemExit("No MLflow runs found")

          print(runs.iloc[0]["run_id"])
          PY
          )
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run_id: $RUN_ID"

         # Install Python dependencies (Docker Build)
      - name: Install Python dependencies
        run: |
          pip install mlflow

        # Upload ke Git LFS
      - name: Set up Git LFS
        run: |
          git config --global user.name "${{ secrets.username }}"
          git config --global user.email "${{ secrets.email }}"

          git lfs install
          git lfs track "mlruns/**"
          git add .gitattributes

          git add mlruns/
          git commit -m "Add mlruns artifacts from CI" || echo "No changes"
          git push origin main

        # Build Docker Model
      - name: Build Docker Model
        run: |
          mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "loan-approval-model"

        # Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          logout: true

        # Tag Docker Image
      - name: Tag Docker Image
        run: |
          docker tag loan-approval-model ${{ secrets.DOCKER_HUB_USERNAME }}/loan-approval-model:latest

        # Push Docker Image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/loan-approval-model:latest
    
