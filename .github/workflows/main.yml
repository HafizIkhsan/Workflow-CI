name: CI/CD MSML hafizikhsan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      
env:
  CSV_URL: "MLproject/loan_approval_preprocessed.csv"
  TARGET_VAR: "loan_approved"
  MLFLOW_TRACKING_URI: "file://${{ github.workspace }}/mlruns"
  EXPERIMENT_NAME: "workflow_ci_rf"
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
    
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"
    
      - name: Check Env
        run: |
          echo $CSV_URL
    
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow pandas scikit-learn numpy

      - name: Prepare MLflow experiment
        run: |
          python - <<'PY'
          import mlflow

          mlflow.set_tracking_uri("${{ env.MLFLOW_TRACKING_URI }}")
          experiment = mlflow.set_experiment("${{ env.EXPERIMENT_NAME }}")
          print(f"Experiment ready: {experiment.experiment_id}")
          PY
    
      - name: Run mlflow project
        run: |
          mlflow run ./MLproject --env-manager=local --experiment-name "${{ env.EXPERIMENT_NAME }}"
    
      - name: Get latest MLflow run id
        run: |
          RUN_ID=$(python - <<'PY'
          import mlflow

          mlflow.set_tracking_uri("${{ env.MLFLOW_TRACKING_URI }}")
          experiment = mlflow.get_experiment_by_name("${{ env.EXPERIMENT_NAME }}")
          if experiment is None:
              raise SystemExit("Experiment not found")

          runs = mlflow.search_runs(
              experiment_ids=[experiment.experiment_id],
              order_by=["attributes.start_time DESC"],
              max_results=1,
          )
          if runs.empty:
              raise SystemExit("No MLflow runs found")

          print(runs.iloc[0]["run_id"])
          PY
          )
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run_id: $RUN_ID"
    
      - name: Build Docker Model
        run: |
          mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "la"
    
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
    
      - name: Tag Docker Image
        run: |
          docker tag la ${{ secrets.DOCKER_HUB_USERNAME }}/la:latest
    
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/la:latest
    
      - name: Set up Git LFS
        run: |
          git config --global user.name ${{ secrets.username }}
          git config --global user.email ${{ secrets.email }}
          git lfs install
          git lfs track "mlruns/**"
          git add .gitattributes
          git commit -m "Track large files in mlruns with Git LFS" || true
          git push origin main
    
      - name: Save mlruns to repo
        run: |
          git config --global user.name ${{ secrets.username }}
          git config --global user.email ${{ secrets.email }}
          git add mlruns/
          git commit -m "Save mlruns from CI run"
          git push origin main
